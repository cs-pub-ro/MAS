version: 1
formatters:
  simple:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: house_building.log
loggers:
  agents:
    level: DEBUG
    handlers: [console, file]
    propagate: no
  environment:
    level: DEBUG
    handlers: [console, file]
    propagate: no
  communication:
    level: DEBUG
    handlers: [console, file]
    propagate: no
  llm:
    level: INFO
    handlers: [console, file]
    propagate: no
  openai:
    level: WARNING
  httpx:
    level: WARNING
  httpcore:
    level: WARNING
  urllib3:
    level: WARNING
root:
  level: DEBUG
  handlers: [console]